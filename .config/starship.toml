"$schema" = 'https://starship.rs/config-schema.json'

format = """
 $directory\
$git_branch\
$git_commit\
$git_state\
$git_status\
$git_metrics\
$docker_context\
$line_break $character"""

[character]
disabled = false
success_symbol = '[](bold fg:green)'
error_symbol = '[](bold fg:red)'
vimcmd_symbol = '[](bold fg:green)'
vimcmd_replace_one_symbol = '[](bold fg:magenta)'
vimcmd_replace_symbol = '[](bold fg:magenta)'
vimcmd_visual_symbol = '[](bold fg:yellow)'

[docker_context]
detect_files = [
  'compose.yaml',
  'compose.yml',
  'docker-compose.yml',
  'docker-compose.yaml',
  'Dockerfile',
]

[directory]
style = "blue"

[git_status]
style = "green"
conflicted = '🏳'
ahead = '🏎💨⬆️${count}'
behind = '😰⬇️${count}'
diverged = '😵↕️⬆️${ahead_count}⬇️${behind_count}'
up_to_date = '✅'
untracked = '🤷'
stashed = '📦'
modified = '📝'
staged = '[➕➕\($count\)](green)'
renamed = '👅'
deleted = '🗑'

[git_state]
format = '[\($state( $progress_current of $progress_total)\)]($style) '
cherry_pick = '[🍒 PICKING](bold red)'
style = "red"

[git_branch]
style = "green"
symbol = '🌱 '

[git_commit]
commit_hash_length = 7
tag_symbol = '🔖 '
